<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512">

  <defs>
    <linearGradient id="bg"
                    x1="0%"
                    y1="0%"
                    x2="100%"
                    y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256"
          cy="256"
          r="220"
          fill="url(#bg)"/>

  <!-- Connections -->
  <line x1="256"
        y1="256"
        x2="140"
        y2="140"
        stroke="white"
        stroke-width="18"/>

  <line x1="256"
        y1="256"
        x2="372"
        y2="140"
        stroke="white"
        stroke-width="18"/>

  <line x1="256"
        y1="256"
        x2="140"
        y2="372"
        stroke="white"
        stroke-width="18"/>

  <line x1="256"
        y1="256"
        x2="372"
        y2="372"
        stroke="white"
        stroke-width="18"/>

  <!-- Center Node -->
  <circle cx="256"
          cy="256"
          r="55"
          fill="white"/>

  <!-- Corner Nodes -->
  <circle cx="140"
          cy="140"
          r="35"
          fill="white"/>

  <circle cx="372"
          cy="140"
          r="35"
          fill="white"/>

  <circle cx="140"
          cy="372"
          r="35"
          fill="white"/>

  <circle cx="372"
          cy="372"
          r="35"
          fill="white"/>

</svg>