<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>LOCALINK</title>

    <link rel="manifest" href="manifest.json" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        background: linear-gradient(135deg, #2563eb, #1d4ed8, #0f172a);

        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 420px;

        backdrop-filter: blur(20px);

        background: rgba(255, 255, 255, 0.15);

        border: 1px solid rgba(255, 255, 255, 0.25);

        border-radius: 24px;

        padding: 35px;

        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);

        text-align: center;
      }

      .logo {
        width: 120px;
        height: 120px;

        margin: auto;
        margin-bottom: 15px;
      }

      .title {
        color: white;
        font-size: 36px;
        font-weight: 700;
      }

      .subtitle {
        color: #dbeafe;
        margin-top: 8px;
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }

      label {
        display: block;
        color: white;
        margin-bottom: 8px;
      }

      input,
      select {
        width: 100%;
        padding: 14px;

        border: none;

        border-radius: 14px;

        font-size: 15px;

        outline: none;
      }

      input:focus,
      select:focus {
        box-shadow: 0 0 0 3px #60a5fa;
      }

      .btn {
        width: 100%;
        border: none;

        cursor: pointer;

        padding: 15px;

        border-radius: 15px;

        font-size: 16px;

        font-weight: 700;

        background: white;

        color: #2563eb;

        transition: 0.3s;
      }

      .btn:hover {
        transform: translateY(-2px);

        background: #eff6ff;
      }

      .footer {
        margin-top: 20px;
        color: #bfdbfe;
        font-size: 13px;
      }

      .error {
        color: #fecaca;
        margin-top: 10px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 200 200">
          <circle cx="100" cy="100" r="28" fill="white" />

          <circle cx="50" cy="50" r="18" fill="white" />

          <circle cx="150" cy="50" r="18" fill="white" />

          <circle cx="50" cy="150" r="18" fill="white" />

          <circle cx="150" cy="150" r="18" fill="white" />

          <line
            x1="100"
            y1="100"
            x2="50"
            y2="50"
            stroke="white"
            stroke-width="6"
          />

          <line
            x1="100"
            y1="100"
            x2="150"
            y2="50"
            stroke="white"
            stroke-width="6"
          />

          <line
            x1="100"
            y1="100"
            x2="50"
            y2="150"
            stroke="white"
            stroke-width="6"
          />

          <line
            x1="100"
            y1="100"
            x2="150"
            y2="150"
            stroke="white"
            stroke-width="6"
          />
        </svg>
      </div>

      <div class="title">LOCALINK</div>

      <div class="subtitle">Connect Locally, Communicate Instantly</div>

      <div class="form-group">
        <label>Username</label>

        <input id="username" maxlength="20" placeholder="Masukkan username" />
      </div>

      <div class="form-group">
        <label>Role</label>

        <select id="role">
          <option>Admin</option>
          <option>Petugas</option>
          <option>Operator</option>
          <option>Tamu</option>
        </select>
      </div>

      <button class="btn" onclick="login()">Masuk Chat</button>

      <div id="error" class="error">Username wajib diisi</div>

      <div class="footer">LOCALINK v1.0</div>
    </div>

    <script>
      function login() {
        const username = document.getElementById("username").value.trim();

        const role = document.getElementById("role").value;

        if (username.length < 1) {
          document.getElementById("error").style.display = "block";

          return;
        }

        localStorage.setItem("username", username);

        localStorage.setItem("role", role);

        localStorage.setItem("theme", "light");

        window.location.href = "chat.html";
      }
    </script>
  </body>
</html>
